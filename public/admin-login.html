<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Nalu by Monaco</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#fff;font-family:Georgia,serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#111;border:1px solid #222;padding:48px 40px;width:100%;max-width:400px;text-align:center;}
h1{color:#c9a84c;letter-spacing:5px;font-size:26px;font-weight:normal;margin-bottom:8px;}
.sub{color:#555;font-size:11px;letter-spacing:2px;margin-bottom:40px;}
label{display:block;text-align:left;color:#666;font-size:10px;letter-spacing:2px;margin-bottom:8px;}
input{width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;padding:14px 16px;font-size:14px;outline:none;margin-bottom:20px;font-family:Georgia,serif;}
input:focus{border-color:#c9a84c;}
button{width:100%;background:#c9a84c;color:#0a0a0a;border:none;padding:16px;font-size:12px;letter-spacing:3px;cursor:pointer;font-weight:bold;font-family:Georgia,serif;}
button:hover{background:#b8963e;}
.err{margin-top:16px;padding:12px;background:#2b0d0d;border:1px solid #5c1a1a;color:#f47878;font-size:13px;}
</style>
</head>
<body>
<div class="card">
  <h1>NALU BY MONACO</h1>
  <p class="sub">ADMIN PORTAL</p>
  <label>USERNAME</label>
  <input type="text" id="u" autocomplete="username">
  <label>PASSWORD</label>
  <input type="password" id="p" autocomplete="current-password">
  <button onclick="login()">LOGIN</button>
  <div id="err"></div>
</div>
<script>
async function login(){
  const u=document.getElementById('u').value,p=document.getElementById('p').value;
  if(!u||!p){show('Please enter username and password.');return;}
  try{
    const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.success)window.location.href='/admin';
    else show(d.error||'Login failed.');
  }catch(e){show('Network error.');}
}
function show(m){document.getElementById('err').innerHTML='<div class="err">'+m+'</div>';}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body>
</html>
